version: "3.9"

services:
  recommendation-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: acmecorp-recommendation-agent:latest
    container_name: recommendation-api
    ports:
      - "8000:8000"
    environment:
      # ── Azure AI Foundry ──────────────────────────────────────────────────
      - AZURE_AI_PROJECT_ENDPOINT=${AZURE_AI_PROJECT_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      # ── Agent config ──────────────────────────────────────────────────────
      - AGENT_NAME=${AGENT_NAME:-product-recommendation-agent}
      # ── Server ───────────────────────────────────────────────────────────
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
